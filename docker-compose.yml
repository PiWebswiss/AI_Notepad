services:
  ollama:
    image: ollama/ollama:latest
    container_name: AI_Notepad-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  # télécharge le modèle 1x puis s'arrête
  ollama_init:
    image: ollama/ollama:latest
    container_name: AI_Notepad-ollama-init
    profiles: ["init"]
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    entrypoint: ["/bin/sh", "-lc", "ollama pull $OLLAMA_MODEL"]
    restart: "no"

  app:
    build: ./app
    container_name: AI_Notepad
    depends_on:
      - ollama
    environment:
      DB_FILE: /data/ainotepad_vocab.db
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-180}
      MODEL_CHECK_INTERVAL: ${MODEL_CHECK_INTERVAL:-30}
      SHOW_MODEL_ERRORS: ${SHOW_MODEL_ERRORS:-1}
      LLM_SERIAL: ${LLM_SERIAL:-1}
      OLLAMA_NUM_PREDICT_MIN: ${OLLAMA_NUM_PREDICT_MIN:-200}
      OLLAMA_NUM_PREDICT_MAX: ${OLLAMA_NUM_PREDICT_MAX:-900}
      WORDLIST_TOP_N: ${WORDLIST_TOP_N:-120000}
      FORCE_RESEED: ${FORCE_RESEED:-0}
      MIN_WORDS_THRESHOLD: ${MIN_WORDS_THRESHOLD:-0}
      ENABLE_FUZZY: ${ENABLE_FUZZY:-0}
      DB_TOP_WORDS: ${DB_TOP_WORDS:-150000}
      DB_TOP_BIGRAMS: ${DB_TOP_BIGRAMS:-80000}
      USE_LLM_NEXT_GHOST: ${USE_LLM_NEXT_GHOST:-0}
      USE_SQLITE_VOCAB: ${USE_SQLITE_VOCAB:-1}
      ALLOW_UNKNOWN_WORDS: ${ALLOW_UNKNOWN_WORDS:-0}
      DISPLAY: ${DISPLAY}
      HEADLESS: ${HEADLESS:-0}
    volumes:
      - app_data:/data
    command: ["bash", "/app/startapp.sh"]
    restart: "no"

volumes:
  ollama:
  app_data:
