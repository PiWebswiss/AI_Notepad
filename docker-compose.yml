# Compose topology:
# - ollama: LLM inference API service (the GUI app runs natively on host via run.ps1)
services:
  ollama: # local LLM server
    image: ollama/ollama:latest
    container_name: AI_Notepad-ollama
    ports:
      - "11434:11434" # expose Ollama API to host
    volumes:
      - ollama:/root/.ollama # persist downloaded models
    # Runtime is swapped by run.sh / run.ps1: 'nvidia' when a GPU is detected
    # on the host, 'runc' (default OCI runtime) otherwise. Keeping the default
    # as 'runc' means the container starts fine on machines without a GPU.
    runtime: ${DOCKER_RUNTIME:-runc}
    # Health check: use the ollama binary (guaranteed to be in the image).
    # Docker marks the container as healthy once this succeeds.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  ollama: # named volume for Ollama model data
